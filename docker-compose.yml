services:
  research-agent:
    image: ${IMAGE_REPO:-research-agent}:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
    command: uvicorn main:app --host 0.0.0.0 --port 8000
